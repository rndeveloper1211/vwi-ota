apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.google.gms.google-services"

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

react {
    hermesEnabled = true
}

android {
    namespace "com.maxuspayy"
    compileSdk 35
    ndkVersion "27.2.12479018"

    defaultConfig {
        applicationId "com.maxuspayy"
        minSdk 24
        targetSdk 35
        versionCode 4
        versionName "0.0.4"
        multiDexEnabled true

        // FIXED: Removed strict abiFilters ("arm64-v8a") from here.
        // We are letting gradle.properties handle 'reactNativeArchitectures' so it works on Emulators too.

        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared", "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
            }
        }
    }
 buildFeatures {
        viewBinding true  // ✅ Yeh add karo
    }
    // FIXED: Added signingConfigs block to use your keystore properties
    signingConfigs {
        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MY_KEYSTORE_PASSWORD
                keyAlias MY_KEY_ALIAS
                keyPassword MY_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // FIXED: Applied the release signing config so the APK is signed
            signingConfig signingConfigs.release

            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        jniLibs {
            // FIXED: Changed to true to bypass strict Android 15 16KB alignment checks for external SDKs
            useLegacyPackaging = true
            pickFirsts += ['**/libc++_shared.so', '**/libfbjni.so']
        }
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
            excludes += 'META-INF/*.kotlin_module'
        }
    }
}

configurations.all {
    resolutionStrategy {
        force 'androidx.lifecycle:lifecycle-viewmodel:2.8.7'
        force 'androidx.lifecycle:lifecycle-runtime:2.8.7'
    }
    exclude group: 'com.google.android.gms', module: 'play-services-safetynet'
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
    implementation "androidx.multidex:multidex:2.0.1"

    // CredoPay & Local AARs
    implementation files('libs/pspwDmt.aar')
    implementation files('libs/pw_ekyc.aar')
    implementation('in.credopay.payment.sdk:vm30-payment-sdk:3.0.20') {
        exclude group: 'com.squareup.retrofit2', module: 'retrofit'
    }

    // Notifee
    implementation project(':notifee_react-native')

    // PayU
    implementation('in.payu:payu-checkout-pro:1.8.2') {
        exclude group: 'org.json', module: 'json'
    }

    // ALL AUTOLINKED LIBRARIES
    implementation project(':react-native-ota-hot-update')
    implementation project(':lottie-react-native')
     implementation project(':react-native-fast-image')
    implementation project(':payu-core-pg-react')
    implementation project(':payu-custom-browser-react')
